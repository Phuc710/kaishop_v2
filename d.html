<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chi tiết đơn hàng</title>
<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6fb;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.open-btn{
    background:#1494a9;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 16px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
}

.open-btn:hover{
    opacity:.92;
}

.popup-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    align-items:center;
    justify-content:center;
    padding:16px;
}

.popup{
    width:100%;
    max-width:460px;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.18);
    animation:showPopup .25s ease;
}

@keyframes showPopup{
    from{
        opacity:0;
        transform:translateY(10px) scale(.98);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.popup-header{
    background:#1494a9;
    color:#fff;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:18px;
    font-weight:700;
}

.close-x{
    background:none;
    border:none;
    color:#fff;
    font-size:24px;
    line-height:1;
    cursor:pointer;
    padding:0;
}

.popup-body{
    padding:20px;
}

.section{
    background:#f8fbfc;
    border:1px solid #e5edf0;
    border-radius:12px;
    padding:14px;
    margin-bottom:16px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    padding:8px 0;
    border-bottom:1px dashed #e5e7eb;
}

.row:last-child{
    border-bottom:none;
    padding-bottom:0;
}

.label{
    color:#6b7280;
    font-size:14px;
}

.value{
    color:#111827;
    font-size:14px;
    font-weight:600;
    text-align:right;
}

.status{
    color:#16a34a;
    background:#eafaf0;
    padding:4px 10px;
    border-radius:999px;
    font-size:13px;
    font-weight:700;
}

.copy-title{
    margin:0 0 10px;
    font-size:15px;
    color:#111827;
}

.copy-box{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    border:1px solid #dbe4e8;
    background:#f9fcfd;
    border-radius:10px;
    padding:10px 12px;
}

.copy-text{
    font-size:14px;
    font-weight:600;
    color:#0f172a;
    word-break:break-all;
}

.copy-btn{
    background:#1494a9;
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 16px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    flex-shrink:0;
}

.copy-btn:hover{
    opacity:.92;
}
</style>
</head>
<body>

<button class="open-btn" onclick="openPopup()">Chi tiết đơn hàng</button>

<div class="popup-bg" id="popup">
    <div class="popup">
        <div class="popup-header">
            <span>Chi tiết đơn hàng</span>
            <button class="close-x" onclick="closePopup()">×</button>
        </div>

        <div class="popup-body">
            <div class="section">
                <div class="row">
                    <span class="label">Mã đơn</span>
                    <span class="value">#3124F777</span>
                </div>

                <div class="row">
                    <span class="label">Sản phẩm</span>
                    <span class="value">GPT PLUS 1 MONTH</span>
                </div>

                <div class="row">
                    <span class="label">Mã đơn hàng</span>
                    <span class="value">#3124F777</span>
                </div>

                <div class="row">
                    <span class="label">Trạng thái</span>
                    <span class="status">Hoàn tất</span>
                </div>

                <div class="row">
                    <span class="label">Số lượng</span>
                    <span class="value">x1</span>
                </div>

                <div class="row">
                    <span class="label">Tổng thanh toán</span>
                    <span class="value">20.000đ</span>
                </div>

                <div class="row">
                    <span class="label">Thời gian đặt</span>
                    <span class="value">12/03/2026 16:22</span>
                </div>

                <div class="row">
                    <span class="label">Thời gian giao</span>
                    <span class="value">12/03/2026 16:22</span>
                </div>
            </div>

            <div class="section">
                <h3 class="copy-title">Nội dung sản phẩm / bàn giao</h3>
                <div class="copy-box">
                    <span class="copy-text" id="content">GPT-PLUS-CODE-XXXX</span>
                    <button class="copy-btn" onclick="copyText(this)">Copy</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function openPopup(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

function copyText(button){
    const text = document.getElementById("content").innerText;
    navigator.clipboard.writeText(text).then(() => {
        const oldText = button.innerText;
        button.innerText = "Đã copy";
        setTimeout(() => {
            button.innerText = oldText;
        }, 1200);
    });
}

document.getElementById("popup").addEventListener("click", function(e){
    if(e.target === this){
        closePopup();
    }
});
</script>

</body>
</html>
