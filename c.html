<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bảng sản phẩm</title>

<style>
body{
  font-family: Arial;
}

.table-box{
  width:100%;
  overflow-x:auto;
}

table{
  border-collapse: collapse;
  min-width:700px;
  width:100%;
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:center;
}

th{
  background:#f4f4f4;
}

button{
  padding:5px 10px;
  cursor:pointer;
}
</style>

</head>

<body>

<h2>Danh sách đơn hàng</h2>

<div class="table-box">
<table>
<thead>
<tr>
<th>SẢN PHẨM</th>
<th>SL</th>
<th>THANH TOÁN</th>
<th>THỜI GIAN</th>
<th>THAO TÁC</th>
</tr>
</thead>

<tbody>
<tr>
<td>Iphone 15 Pro Max</td>
<td>2</td>
<td>20.000.000₫</td>
<td>12/03/2026</td>
<td>
<button>Sửa</button>
<button>Xóa</button>
</td>
</tr>

<tr>
<td>Macbook M3</td>
<td>1</td>
<td>35.000.000₫</td>
<td>11/03/2026</td>
<td>
<button>Sửa</button>
<button>Xóa</button>
</td>
</tr>

<tr>
<td>Airpods Pro</td>
<td>3</td>
<td>9.000.000₫</td>
<td>10/03/2026</td>
<td>
<button>Sửa</button>
<button>Xóa</button>
</td>
</tr>

</tbody>
</table>
</div>

</body>
</html>
